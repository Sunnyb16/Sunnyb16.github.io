<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wrath of the Cat</title>

  <!-- Custom font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background-color: #111111;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
    }

    .card {
      width: 500px;
      height: 750px;
      background-color: #e9e9e9;
      padding: 36px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.35);
      box-sizing: border-box;
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      margin-bottom: 12px;
      border-radius: 4px;
      display: block;
    }

    .card h1 {
      font-family: 'Montserrat', sans-serif;
      font-size: 48px;
      color: #c30000;
      margin: 0 0 18px 0;
    }

    .card p {
      font-size: 18px;
      color: #111111;
      margin-bottom: 20px;
    }

    .card ul {
      font-size: 16px;
      margin-bottom: 28px;
    }

    .card button {
      background-color: #000000;
      color: white;
      border: none;
      padding: 12px 18px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    .card button:hover {
      background-color: #333333;
    }

    .button-link {
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Replace with your local image file name -->
    <img src="cat.png" alt="Chaotic cat">

    <h1>Wrath of the Cat</h1>

    <p>
      Summon 1 emotionally unstable cat with infinite chaos that can take the following actions:
    </p>

    <ul>
      <li>0 damage, but ruins your entire day</li>
      <li>Can slap your face unexpectedly</li>
      <li>Will scream at 3am for no reason</li>
      <li>Demands food immediately after eating</li>
    </ul>

    <a class="button-link" href="https://www.youtube.com/watch?v=J---aiyznGQ" target="_blank">
      <button>Summon Chaos</button>
    </a>
  </div>
</body>
</html>
